<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0e0e17"/>
  <rect x="1" y="1" width="62" height="62" rx="13" stroke="#e50914" stroke-width="1.5" stroke-opacity="0.7"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2d3b"/>
      <stop offset="100%" stop-color="#c40000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- D letter -->
  <path d="M9 14 L9 50 L23 50 C33 50 40 43 40 32 C40 21 33 14 23 14 Z" fill="url(#g1)" filter="url(#glow)"/>
  <path d="M15 20 L15 44 L22 44 C28.5 44 33.5 38.5 33.5 32 C33.5 25.5 28.5 20 22 20 Z" fill="#07070d"/>
  <!-- L letter -->
  <path d="M43 14 L43 50 L56 50 L56 43 L50 43 L50 14 Z" fill="url(#g1)" filter="url(#glow)"/>
  <!-- DL glow dot -->
  <circle cx="32" cy="56" r="2.5" fill="#e50914" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
